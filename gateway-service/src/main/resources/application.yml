server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lowerCaseServiceId: true  # Corrigé en CamelCase
      globalcors:
        corsConfigurations:         # Corrigé en CamelCase
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:         # Corrigé en format liste pour Spring
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
