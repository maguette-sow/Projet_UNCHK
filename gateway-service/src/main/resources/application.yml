server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      # 🌟 SOLUTION PRO : Découverte 100% automatique via l'annuaire Eureka
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true # Permet d'appeler /utilisateur-service/ ou /budget-service/

      # 🌟 Nettoyage des en-têtes CORS sans altérer la structure des routes HTTP
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_FIRST

      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: false

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
