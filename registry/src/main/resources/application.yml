server:
  port: 8761

spring:
  application:
    name: registry

eureka:
  instance:
    # Évite le blocage et les alertes "Cannot determine local hostname" sous Windows
    prefer-ip-address: true
  client:
    register-with-eureka: false
    fetch-registry: false
    #  Définit explicitement l'URL locale du serveur
    service-url:
      defaultZone: http://localhost:8761/eureka/
